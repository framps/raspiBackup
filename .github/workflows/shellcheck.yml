name: ShellCheck
on: [push]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: './*.sh'
          ignore_paths: >-
            helper
            test
            scripts
          severity: warning
